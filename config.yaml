data:
  raw_path: data/raw
  processed_path: data/processed
  source: synthetic
  # allowed_root: data  # uncomment to confine --input to this directory (defense-
  # in-depth; only relevant if this CLI is ever driven by paths from an untrusted
  # remote caller -- see docs/AUDIT_REPORT.md §4.5). Unset by default: a local
  # CLI has no privilege boundary to enforce against its own invoking user.
  column_mapping:
    case_id: "case:concept:name"
    activity: "concept:name"
    timestamp: "time:timestamp"

discovery:
  algorithm: inductive  # inductive | heuristics
  variant: IMd         # IM | IMf | IMd
  noise_threshold: 0.2

conformance:
  method: token_based  # token_based | alignment
  model_path: data/normative/o2c_sop.pnml

analysis:
  top_variants: 10
  bottleneck_percentile: 90

visualization:
  dashboard_port: 8501
  petri_format: svg   # svg | png
  max_dfg_nodes: 50

logging:
  level: INFO
  file: logs/pipeline.log
